<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/webp" id="icon-head">
</head>

<body class="login-page">

    <div class="login-left">

        <h1>Library System</h1>

        <p>
            Sistema de gerenciamento de bibliotecas com acesso seguro para administradores e funcionários.
        </p>

        <img id="books" class="books-image" alt="Livros">

    </div>

    <div class="login-container ">
        <img id="icon-body" alt="Ícone">

        <h2>Bem-vindo</h2>

        <span>Entre com sua conta para continuar</span>

        <form id="loginForm">
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Endereço de email</label>
                <input type="email" class="form-control" id="email" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">Nunca compartilharemos seu e-mail com ninguém.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password">
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>
</body>

</html>
