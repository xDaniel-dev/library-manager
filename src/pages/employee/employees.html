<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">
</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand marki ">
                    <img id="icon-header" alt="Logo">
                    <div>
                        <small>Library System</small>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" id="home-menu">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="books-menu">Livros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="clients-menu">Clientes</a>
                        </li>
                        <li class="nav-item admin-only">
                            <a class="nav-link" id="employees-menu">
                                Funcionários
                            </a>
                        </li>
                    </ul>
                    <button id="exit-menu">
                        <i class="bi bi-box-arrow-right"></i>
                        Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <section>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header">
                <h5>Library System</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas">
                </button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="home-menu-mobile">
                            <i class="bi bi-house-door"></i>
                            Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="books-menu-mobile">
                            <i class="bi bi-book"></i>
                            Livros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clients-menu-mobile">
                            <i class="bi bi-people"></i>
                            Clientes
                        </a>
                    </li>
                    <li class="nav-item admin-only">
                        <a class="nav-link" id="employees-menu-mobile">
                            <i class="bi bi-person-badge"></i>
                            Funcionários
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a class="nav-link" id="exit-menu-mobile">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>
    <main>
        <div class="books-page container-fluid">

            <div class="books-header">
                <h2>Clientes cadastrados</h2>

                <div class="books-filters">
                    <div class="search">
                        <input type="text" id="search-book" class="form-control" placeholder="Pesquisar por cliente ...">
                    </div>
                </div>
            </div>

            <ul class="books-list" id="ul"></ul>
        </div>
    </main>

</body>
</html>
