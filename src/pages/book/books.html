<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">
    <script src="/bundle.js" defer></script>

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg bg-body-tertiary ">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle menu-user" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Menu
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" id="home-menu">Home</a></li>
                                <li><a class="dropdown-item" id="books-menu">Livros</a></li>
                                <li><a class="dropdown-item" id="clients-menu">Clientes</a></li>
                                <li><a class="dropdown-item admin-only" id="employees-menu">Funcionários</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" id="exit-menu">Sair</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="mark">
            <img id="icon-header" alt="icone-livro">
            <h3>Biblioteca</h3>
        </div>
    </header>
    <div class="books-page container-fluid">

        <div class="books-header">
            <h2>Livros Cadastrados</h2>

            <div class="books-filters">

                <div class="search">
                    <input type="text" id="search-book" class="form-control" placeholder="Pesquisar livro...">
                </div>

                <div class="category">
                    <select class="form-select" id="category">
                        <option selected>Todos</option>
                        <option>Romance</option>
                        <option>Fantasia</option>
                        <option>Ficção Científica</option>
                        <option>Suspense</option>
                        <option>Terror</option>
                        <option>Drama</option>
                        <option>Biografia</option>
                        <option>Tecnologia</option>
                        <option>Educação</option>
                        <option>Outros</option>
                    </select>
                </div>

            </div>
        </div>

        <ul class="books-list" id="ul"></ul>
    </div>
</html>
