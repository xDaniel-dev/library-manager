<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand marki ">
                    <img id="icon-header" alt="Logo">
                    <div>
                        <small>Library System</small>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" id="home-menu">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="books-menu">Livros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="clients-menu">Clientes</a>
                        </li>
                        <li class="nav-item admin-only">
                            <a class="nav-link" id="employees-menu">
                                Funcionários
                            </a>
                        </li>
                    </ul>
                    <button id="exit-menu">
                        <i class="bi bi-box-arrow-right"></i>
                        Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <section>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header">
                <h5>Library System</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas">
                </button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="home-menu-mobile">
                            <i class="bi bi-house-door"></i>
                            Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="books-menu-mobile">
                            <i class="bi bi-book"></i>
                            Livros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clients-menu-mobile">
                            <i class="bi bi-people"></i>
                            Clientes
                        </a>
                    </li>
                    <li class="nav-item admin-only">
                        <a class="nav-link" id="employees-menu-mobile">
                            <i class="bi bi-person-badge"></i>
                            Funcionários
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a class="nav-link" id="exit-menu-mobile">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <main>
        <section class="register">
            <form id="form">

                <h3 class="mb-4">Registrar Devolução</h3>

                <div class="row">

                    <!-- Código do empréstimo -->
                    <div class="col-md-4 mb-3">
                        <label for="code" class="form-label">Código do Empréstimo</label>
                        <input  class="form-control" id="code" placeholder="Ex.: VAAQ63XW">
                        <div id="codeError" class="invalid-feedback"></div>
                        <button type="button" class="btn btn-success" id="confirm-code">verificar</button>
                    </div>

                    <!-- Cliente -->
                    <div class="col-md-8 mb-3">
                        <label for="client" class="form-label">Cliente</label>
                        <input type="text" class="form-control" id="client" value="Cliente" readonly>
                    </div>

                    <!-- Livro -->
                    <div class="col-md-6 mb-3">
                        <label for="book" class="form-label">Livro</label>
                        <input type="text" class="form-control" id="book" value="Livro" readonly>
                    </div>

                    <!-- Funcionário -->
                    <div class="col-md-6 mb-3">
                        <label for="employee" class="form-label">Funcionário Responsável</label>
                        <input type="text" class="form-control" id="employee" value="Funcionário Logado" readonly>
                    </div>

                    <!-- Empréstimo -->
                    <div class="col-md-4 mb-3">
                        <label for="loan-date" class="form-label">Data do Empréstimo</label>
                        <input type="date" class="form-control" id="loan-date" readonly>
                    </div>

                    <!-- Prevista -->
                    <div class="col-md-4 mb-3">
                        <label for="return-date" class="form-label">Data Prevista</label>
                        <input type="date" class="form-control" id="return-date" readonly>
                    </div>

                    <!-- Devolução -->
                    <div class="col-md-4 mb-3">
                        <label for="date-current" class="form-label">Data da Devolução</label>
                        <input type="date" class="form-control" id="date-current">
                        <div id="dateError" class="invalid-feedback"></div>
                    </div>

                    <!-- Situação -->
                    <div class="col-md-4 mb-3">
                        <label for="situation" class="form-label">Situação</label>
                        <select class="form-select" id="situation">
                            <option selected>Selecione a situação</option>
                            <option>Devolvido</option>
                            <option>Livro danificado</option>
                            <option>Livro perdido</option>
                        </select>
                        <div id="situationError" class="invalid-feedback"></div>
                    </div>

                    <!-- Multa -->
                    <div class="col-md-4 mb-3">
                        <label for="fine" class="form-label">Multa (R$)</label>
                        <input class="form-control" id="fine" value=" R$ 0,00 "  readonly>
                    </div>

                    <!-- Observações -->
                    <div class="col-12 mb-3">
                        <label for="observations" class="form-label">Observações</label>
                        <textarea class="form-control" id="observations" rows="4"
                            placeholder="Informe danos, atraso ou qualquer observação sobre a devolução."></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">

                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Registrar Devolução
                    </button>

                </div>

            </form>
        </section>
    </main>
















</body>

</html>
