<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand marki ">
                    <img id="icon-header" alt="Logo">
                    <div>
                        <small>Library System</small>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" id="home-menu">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="books-menu">Livros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="clients-menu">Clientes</a>
                        </li>
                        <li class="nav-item admin-only">
                            <a class="nav-link" id="employees-menu">
                                Funcionários
                            </a>
                        </li>
                    </ul>
                    <button id="exit-menu">
                        <i class="bi bi-box-arrow-right"></i>
                        Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <section>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header">
                <h5>Library System</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas">
                </button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="home-menu-mobile">
                            <i class="bi bi-house-door"></i>
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="books-menu-mobile">
                            <i class="bi bi-book"></i>
                            Livros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clients-menu-mobile">
                            <i class="bi bi-people"></i>
                            Clientes
                        </a>
                    </li>
                    <li class="nav-item admin-only">
                        <a class="nav-link" id="employees-menu-mobile">
                            <i class="bi bi-person-badge"></i>
                            Funcionários
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a class="nav-link" id="exit-menu-mobile">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>
    <main>
        <section class="register">
            <form id="form">

                <h3 class="mb-4">Cadastro de Livro</h3>

                <div class="row">

                    <div class="col-md-8 mb-3">
                        <label for="title" class="form-label">Título</label>
                        <input type="text" class="form-control" id="title" placeholder="Digite o título do livro">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="isbn" class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="isbn" placeholder="000-00-00000-00-0">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="author" class="form-label">Autor</label>
                        <input type="text" class="form-control" id="author" placeholder="Nome do autor">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="publisher" class="form-label">Editora</label>
                        <input type="text" class="form-control" id="publisher" placeholder="Nome da editora">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="category" class="form-label">Categoria</label>
                        <select class="form-select" id="category">
                            <option selected>Selecione</option>
                            <option>Romance</option>
                            <option>Fantasia</option>
                            <option>Ficção Científica</option>
                            <option>Suspense</option>
                            <option>Terror</option>
                            <option>Drama</option>
                            <option>Biografia</option>
                            <option>Tecnologia</option>
                            <option>Educação</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="year" class="form-label">Ano de Publicação</label>
                        <input type="number" class="form-control" id="year" placeholder="2026">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="language" class="form-label">Idioma</label>
                        <select class="form-select" id="language">
                            <option selected>Selecione</option>
                            <option>Português</option>
                            <option>Inglês</option>
                            <option>Espanhol</option>
                            <option>Francês</option>
                            <option>Outro</option>
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label for="description" class="form-label">Sinopse</label>
                        <textarea class="form-control" id="description" rows="4"
                            placeholder="Digite uma breve sinopse do livro"></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Cadastrar Livro
                    </button>
                </div>
            </form>
        </section>
    </main>

</body>

</html>
