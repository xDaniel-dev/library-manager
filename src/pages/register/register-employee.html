<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand marki ">
                    <img id="icon-header" alt="Logo">
                    <div>
                        <small>Library System</small>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" id="home-menu">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="books-menu">Livros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="clients-menu">Clientes</a>
                        </li>
                        <li class="nav-item admin-only">
                            <a class="nav-link" id="employees-menu">
                                Funcionários
                            </a>
                        </li>
                    </ul>
                    <button id="exit-menu">
                        <i class="bi bi-box-arrow-right"></i>
                        Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <section>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header">
                <h5>Library System</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas">
                </button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="home-menu-mobile">
                            <i class="bi bi-house-door"></i>
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="books-menu-mobile">
                            <i class="bi bi-book"></i>
                            Livros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clients-menu-mobile">
                            <i class="bi bi-people"></i>
                            Clientes
                        </a>
                    </li>
                    <li class="nav-item admin-only">
                        <a class="nav-link" id="employees-menu-mobile">
                            <i class="bi bi-person-badge"></i>
                            Funcionários
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a class="nav-link" id="exit-menu-mobile">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <main>
        <section class="register">
            <form id="form">
                <h3 class="mb-4">Cadastro de Funcionário</h3>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="name" placeholder="Digite o nome completo">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="email@biblioteca.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telephone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telephone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="role" class="form-label">Cargo</label>
                        <select class="form-select" id="role">
                            <option selected>Selecione</option>
                            <option>Funcionário</option>
                            <option>Gerente</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="date" class="form-label">Data de admissão</label>
                        <input type="date" class="form-control" id="date">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" placeholder="Digite uma senha">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="confirmPassword" class="form-label">Confirmar senha</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirme a senha">
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Cadastrar Funcionário
                    </button>
                </div>

            </form>
        </section>
    </main>


</body>

</html>
