<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
   <header class="main-header">
        <nav class="navbar navbar-expand-lg bg-body-tertiary ">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle menu-user" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Menu
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" id="home-menu">Home</a></li>
                                <li><a class="dropdown-item" id="books-menu">Livros</a></li>
                                <li><a class="dropdown-item" id="clients-menu">Clientes</a></li>
                                <li><a class="dropdown-item admin-only" id="employees-menu">Funcionários</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" id="exit-menu">Sair</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="mark">
            <img id="icon-header" alt="icone-livro">
            <h3>Biblioteca</h3>
        </div>
    </header>

    <main>
        <section class="register">
            <form>

                <h3 class="mb-4">Cadastro de Funcionário</h3>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite o nome completo">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="email@biblioteca.com">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="cargo" class="form-label">Cargo</label>
                        <select class="form-select" id="cargo">
                            <option selected>Selecione</option>
                            <option>Funcionário</option>
                            <option>Gerente</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="admissao" class="form-label">Data de admissão</label>
                        <input type="date" class="form-control" id="admissao">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status">
                            <option selected>Ativo</option>
                            <option>Inativo</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="usuario" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="usuario" placeholder="Nome de usuário">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Digite uma senha">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="confirmarSenha" class="form-label">Confirmar senha</label>
                        <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme a senha">
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Cadastrar Funcionário
                    </button>
                </div>

            </form>
        </section>
    </main>


</body>

</html>
