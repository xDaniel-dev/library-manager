<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg bg-body-tertiary ">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle menu-user" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Menu
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" id="home-menu">Home</a></li>
                                <li><a class="dropdown-item" id="books-menu">Livros</a></li>
                                <li><a class="dropdown-item" id="clients-menu">Clientes</a></li>
                                <li><a class="dropdown-item admin-only" id="employees-menu">Funcionários</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" id="exit-menu">Sair</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="mark">
            <img id="icon-header" alt="icone-livro">
            <h3>Biblioteca</h3>
        </div>
    </header>

    <main>
        <section class="register">
            <form>

                <h3 class="mb-4">Registrar Empréstimo</h3>

                <div class="row">

                    <!-- Cliente -->
                    <div class="col-md-6 mb-3">
                        <label for="cliente" class="form-label">Cliente</label>
                        <select class="form-select" id="cliente">
                            <option selected>Selecione um cliente</option>
                            <option>João Silva</option>
                            <option>Maria Souza</option>
                            <option>Carlos Oliveira</option>
                        </select>
                    </div>

                    <!-- Livro -->
                    <div class="col-md-6 mb-3">
                        <label for="livro" class="form-label">Livro</label>
                        <select class="form-select" id="livro">
                            <option selected>Selecione um livro</option>
                            <option>Clean Code</option>
                            <option>Dom Casmurro</option>
                            <option>Harry Potter</option>
                        </select>
                    </div>

                    <!-- Funcionário -->
                    <div class="col-md-6 mb-3">
                        <label for="funcionario" class="form-label">Funcionário Responsável</label>
                        <input type="text" class="form-control" id="funcionario" value="Funcionário Logado" readonly>
                    </div>

                    <!-- Data do empréstimo -->
                    <div class="col-md-3 mb-3">
                        <label for="emprestimo" class="form-label">Data do empréstimo</label>
                        <input type="date" class="form-control" id="emprestimo">
                    </div>

                    <!-- Data prevista -->
                    <div class="col-md-3 mb-3">
                        <label for="devolucao" class="form-label">Data prevista para devolução</label>
                        <input type="date" class="form-control" id="devolucao">
                    </div>

                    <!-- Status -->
                    <div class="col-md-3 mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status">
                            <option selected>Em andamento</option>
                        </select>
                    </div>

                    <!-- Observações -->
                    <div class="col-12 mb-3">
                        <label for="observacao" class="form-label">Observações</label>
                        <textarea class="form-control" id="observacao" rows="4"
                            placeholder="Observações sobre o empréstimo (opcional)"></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">

                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Registrar Empréstimo
                    </button>

                </div>

            </form>
        </section>
    </main>


</body>

</html>
