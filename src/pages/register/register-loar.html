<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="icon" type="image/webp" id="icon-head">

</head>

<body>
    <header class="main-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand marki ">
                    <img id="icon-header" alt="Logo">
                    <div>
                        <small>Library System</small>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" id="home-menu">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="books-menu">Livros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="clients-menu">Clientes</a>
                        </li>
                        <li class="nav-item admin-only">
                            <a class="nav-link" id="employees-menu">
                                Funcionários
                            </a>
                        </li>
                    </ul>
                    <button id="exit-menu">
                        <i class="bi bi-box-arrow-right"></i>
                        Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <section>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header">
                <h5>Library System</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas">
                </button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="home-menu-mobile">
                            <i class="bi bi-house-door"></i>
                            Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="books-menu-mobile">
                            <i class="bi bi-book"></i>
                            Livros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clients-menu-mobile">
                            <i class="bi bi-people"></i>
                            Clientes
                        </a>
                    </li>
                    <li class="nav-item admin-only">
                        <a class="nav-link" id="employees-menu-mobile">
                            <i class="bi bi-person-badge"></i>
                            Funcionários
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a class="nav-link" id="exit-menu-mobile">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <main>
        <section class="register">
            <form id="form">
                <h3 class="mb-4">Registrar Empréstimo</h3>
                <div class="row">
                    <!-- Cliente -->
                    <div class="col-md-6 mb-3">
                        <label for="client" class="form-label">Cliente</label>
                        <select class="form-select" id="client">
                            <option selected>Selecione um cliente</option>
                        </select>
                        <div id="clientError" class="invalid-feedback"></div>
                        <button type="button" class="btn btn-success" id="confirm-client">verificar</button>
                    </div>

                    <!-- CPF -->
                    <div class="col-md-6 mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" value="000.000.000 - 00" readonly>
                        <div id="cpfError" class="invalid-feedback"></div>
                    </div>

                    <!-- Livro -->
                    <div class="col-md-6 mb-3">
                        <label for="book" class="form-label">Livro</label>
                        <select class="form-select" id="book">
                            <option selected>Selecione um livro</option>
                        </select>
                        <div id="bookError" class="invalid-feedback"></div>
                    </div>

                    <!-- Funcionário -->
                    <div class="col-md-6 mb-3">
                        <label for="employee" class="form-label">Funcionário Responsável</label>
                        <input type="text" class="form-control" id="employee" readonly>
                    </div>

                    <!-- Data do empréstimo -->
                    <div class="col-md-3 mb-3">
                        <label for="loan" class="form-label">Data do empréstimo</label>
                        <input type="date" class="form-control" id="loan">
                        <div id="loanError" class="invalid-feedback"></div>
                    </div>

                    <!-- Data prevista -->
                    <div class="col-md-3 mb-3">
                        <label for="return" class="form-label">Data para devolução</label>
                        <input type="date" class="form-control" id="return">
                        <div id="returnError" class="invalid-feedback"></div>
                    </div>

                    <!-- Observações -->
                    <div class="col-12 mb-3">
                        <label for="observations" class="form-label">Observações</label>
                        <textarea class="form-control" id="observations" rows="4"
                            placeholder="Observações sobre o empréstimo (opcional)"></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">

                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Registrar Empréstimo
                    </button>

                </div>

            </form>
        </section>
    </main>


</body>

</html>
